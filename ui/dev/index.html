<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AskGaius User Portal</title>
        <style>
            :root {
                font-family: Arial, sans-serif;
                line-height: 1.5;
                font-weight: 400;
                box-sizing: border-box;

                color-scheme: light dark;

                color: #281f3f;
                background-color: #f2f1f4;

                font-synthesis: none;
                text-rendering: optimizeLegibility;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                --gaius-light-grey: #f2f1f4;
                --gaius-light-grey-2: #afa9bc;
                --gaius-dark-grey: #281f3f;
                --gaius-light-green: #dfe7df;
                --gaius-mid-green: #6e916e;
                --gaius-dark-green: #2a431e;
                --gaius-dark-blue: #1e1e43;
                --gaius-light-blue: #d8d8ee;
                --gaius-dark-red: #7e1b1b;
                --gaius-light-red: #f6d5d5;
                --gaius-yellow: #eeead8;
                --gaius-link-blue-1: #273f53;
                --gaius-link-blue-2: #375d76;

                --button-transition: 0.3s;
            }

            html,
            body {
                box-sizing: border-box;
                line-height: 1.5;
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                background: var(--gaius-light-grey);
                color: var(--gaius-dark-grey);
            }

                </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
